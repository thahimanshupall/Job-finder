<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>User Form | JobFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/user_form.css}"/>
</head>
<body>

<div class="page-wrapper">

    <!-- Sidebar (same as users page) -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">JF</div>
            <span class="brand-name">JobFinder</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/users" class="nav-item active"><span class="nav-icon">👥</span><span>Users</span></a>
            <a href="#" class="nav-item"><span class="nav-icon">💼</span><span>Jobs</span></a>
            <a href="#" class="nav-item"><span class="nav-icon">📊</span><span>Reports</span></a>
            <a href="#" class="nav-item"><span class="nav-icon">⚙️</span><span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="admin-avatar">A</div>
            <div class="admin-info">
                <span class="admin-name">Admin</span>
                <span class="admin-role">Super Admin</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <a th:href="@{/users}" class="back-btn">← Back</a>
                <div>
                    <h1 class="page-title" th:text="${user.id == null} ? 'Add New User' : 'Update User'">User Form</h1>
                    <p class="page-subtitle" th:text="${user.id == null} ? 'Fill in the details to register a new user' : 'Edit user information below'"></p>
                </div>
            </div>
        </header>

        <!-- Form Card -->
        <div class="form-outer">
            <div class="form-card">

                <!-- Card Header -->
                <div class="form-card-header">
                    <div class="form-icon" th:text="${user.id == null} ? '➕' : '✏️'">➕</div>
                    <div>
                        <div class="form-card-title" th:text="${user.id == null} ? 'New User Registration' : 'Edit User Details'"></div>
                        <div class="form-card-sub">All fields marked are required</div>
                    </div>
                </div>

                <form th:action="@{/saveUser}" th:object="${user}" method="post">
                    <input type="hidden" th:field="*{id}"/>

                    <!-- Two column grid -->
                    <div class="form-grid">

                        <!-- Name -->
                        <div class="field-group">
                            <label class="field-label">Full Name</label>
                            <input type="text" th:field="*{name}" class="field-input" placeholder="e.g. Rahul Sharma"/>
                            <small class="field-error" th:errors="*{name}"></small>
                        </div>

                        <!-- Mobile -->
                        <div class="field-group">
                            <label class="field-label">Mobile Number</label>
                            <input type="text" th:field="*{number}" class="field-input" placeholder="e.g. 9876543210"/>
                            <small class="field-error" th:errors="*{number}"></small>
                        </div>

                        <!-- Email -->
                        <div class="field-group full-width">
                            <label class="field-label">Email Address</label>
                            <input type="email" th:field="*{email}" class="field-input" placeholder="e.g. rahul@example.com"/>
                            <small class="field-error" th:errors="*{email}"></small>
                            <small class="field-error" th:text="${emailError}"></small>
                        </div>

                        <!-- State -->
                        <div class="field-group">
                            <label class="field-label">State</label>
                            <input type="text" th:field="*{state}" class="field-input" placeholder="e.g. Uttar Pradesh"/>
                            <small class="field-error" th:errors="*{state}"></small>
                        </div>

                        <!-- District -->
                        <div class="field-group">
                            <label class="field-label">District</label>
                            <input type="text" th:field="*{district}" class="field-input" placeholder="e.g. Lucknow"/>
                            <small class="field-error" th:errors="*{district}"></small>
                        </div>

                        <!-- Country -->
                        <div class="field-group">
                            <label class="field-label">Country</label>
                            <input type="text" th:field="*{country}" class="field-input" placeholder="e.g. India"/>
                            <small class="field-error" th:errors="*{country}"></small>
                        </div>

                        <!-- Pincode -->
                        <div class="field-group">
                            <label class="field-label">Pincode</label>
                            <input type="text" th:field="*{pincode}" class="field-input" placeholder="e.g. 226001"/>
                            <small class="field-error" th:errors="*{pincode}"></small>
                        </div>

                        <!-- Password -->
                        <div class="field-group full-width">
                            <label class="field-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" th:field="*{password}" class="field-input" placeholder="Enter password" id="passwordInput"/>
                                <button type="button" class="toggle-pass" onclick="togglePassword()">👁️</button>
                            </div>
                            <small class="field-error" th:errors="*{password}"></small>
                        </div>

                    </div>

                    <!-- Actions -->
                    <div class="form-actions">
                        <a th:href="@{/users}" class="btn-cancel">Cancel</a>
                        <button type="submit" class="btn-save">
                            <span th:text="${user.id == null} ? '+ Save User' : '✔ Update User'">Save</span>
                        </button>
                    </div>

                </form>
            </div>
        </div>

    </main>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Add focus animation to inputs
    document.querySelectorAll('.field-input').forEach(input => {
        input.addEventListener('focus', () => {
            input.closest('.field-group').classList.add('focused');
        });
        input.addEventListener('blur', () => {
            input.closest('.field-group').classList.remove('focused');
        });
    });
</script>

</body>
</html>
