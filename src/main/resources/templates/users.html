<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users | JobFinder</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/users.css}">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Registered Users</h2>
            <a th:href="@{/addUser}" class="btn btn-primary">
                + Add New User
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>Email</th>
                        <th>State</th>
                        <th>District</th>
                        <th>Country</th>
                        <th>Pincode</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.name}"></td>
                        <td th:text="${user.number}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.state}"></td>
                        <td th:text="${user.district}"></td>
                        <td th:text="${user.country}"></td>
                        <td th:text="${user.pincode}"></td>
                        <td>
                            <a th:href="@{/edit/{id}(id=${user.id})}"
                               class="btn btn-sm btn-warning me-2">
                                Edit
                            </a>

                            <form th:action="@{/delete/{id}(id=${user.id})}" method="post"
                                  style="display:inline"
                                  onsubmit="return confirm('Are you sure?')">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>

                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>
